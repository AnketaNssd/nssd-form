<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Анкета — НССД</title>
<style>
body { font-family: Arial; background:#f5f6fa; padding:40px; }
.container { max-width:500px; margin:auto; background:white; padding:20px; border-radius:10px; }
input, button { width:100%; padding:12px; margin-top:10px; }
button { background:#1a2b6b; color:white; border:none; cursor:pointer; }
</style>
</head>

<body>

<div class="container">
<h2>Заявка НССД</h2>

<form id="form">
<input name="fio" placeholder="ФИО" required>
<input name="phone" placeholder="Телефон" required>
<input name="debt_amount" placeholder="Сумма долга" required>

<button type="submit">Отправить</button>
</form>

<p id="status"></p>
</div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbysITu7OG8kFWn7rhyBNHXLY_1C0GKupDkVTWZLYEnCLWxy4q3peE8mWijLp911cpO8/exec';

document.getElementById('form').addEventListener('submit', async function(e) {
  e.preventDefault();

  const status = document.getElementById('status');
  status.innerText = 'Отправка...';

  const data = {
    'Дата и время': new Date().toLocaleString('ru-RU'),
    'ФИО': this.fio.value,
    'Телефон': this.phone.value,
    'Сумма долга': this.debt_amount.value
  };

  try {
    const formData = new FormData();
    formData.append('data', JSON.stringify(data));

    await fetch(SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      body: formData
    });

    status.innerText = 'Заявка отправлена ✅';
    this.reset();

  } catch (err) {
    status.innerText = 'Ошибка отправки ❌';
    console.error(err);
  }
});
</script>

</body>
</html>
